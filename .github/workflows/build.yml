name: Build iPhone 7 UEFI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: |
          sudo -S -p '' apt-get update -qq
          sudo -S -p '' apt-get install -y -qq gcc-aarch64-linux-gnu nasm
          pip3 install --upgrade pip
          pip3 install -r pip-requirements.txt

      - name: Setup NASM extdep
        run: |
          D=$(pwd)/MU_BASECORE/BaseTools/Bin/nasm_extdep/nasm-1
          mkdir -p $D
          ln -sf $(which nasm) $D/nasm
          chmod +x $D/nasm
          cat > $D/extdep_version.yaml << 'VEOF'
          version: 20016.1.1
          VEOF
          echo "NASM extdep ready"

      - name: Update Dependencies
        run: |
          export GCC5_AARCH64_PREFIX=aarch64-linux-gnu-
          stuart_update -c Platform/iPhone7Pkg/PlatformBuild.py TOOL_CHAIN_TAG=GCC5

      - name: Build UEFI
        run: |
          export GCC5_AARCH64_PREFIX=aarch64-linux-gnu-
          stuart_build -c Platform/iPhone7Pkg/PlatformBuild.py TOOL_CHAIN_TAG=GCC5 TARGET=DEBUG
          
      - uses: actions/upload-artifact@v4
        with:
          name: iPhone7-UEFI
          path: Build/iPhone7-AARCH64/DEBUG_GCC5/FV/
