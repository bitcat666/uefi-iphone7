name: Build iPhone 7 UEFI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo -S -p '' apt-get update
          sudo -S -p '' apt-get install -y gcc-aarch64-linux-gnu nasm python3 python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install -r pip-requirements.txt
          
      - name: Setup Environment
        run: |
          export GCC5_AARCH64_PREFIX=aarch64-linux-gnu-
          export PATH=$PATH:$(pwd)/MU_BASECORE/BaseTools/Bin
          
      - name: Build UEFI
        run: |
          export GCC5_AARCH64_PREFIX=aarch64-linux-gnu-
          export PATH=$PATH:$(pwd)/MU_BASECORE/BaseTools/Bin
          cd MU_BASECORE
          python3 BaseTools/Edk2ToolsBuild.py -t GCC5
          cd ..
          stuart_build -c Platform/iPhone7Pkg/PlatformBuild.py TOOL_CHAIN_TAG=GCC5 TARGET=DEBUG
          
      - uses: actions/upload-artifact@v4
        with:
          name: iPhone7-UEFI
          path: Build/iPhone7-AARCH64/DEBUG_GCC5/FV/
