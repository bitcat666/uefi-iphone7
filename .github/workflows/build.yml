name: Build UEFI Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      PACKAGES_PATH: "Platform:MU_BASECORE:Common/MU:Common/TIANO:Common/MU_OEM_SAMPLE:Silicon/ARM/TIANO:Silicon/Apple:Common/MU_DFCI:mu_feature_debugger"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone submodules (PINNED COMMITS)
        run: |
          rm -rf MU_BASECORE Common/MU Common/TIANO Common/MU_OEM_SAMPLE Silicon/ARM/TIANO Common/MU_DFCI mu_feature_debugger
          git clone https://github.com/Microsoft/mu_basecore.git MU_BASECORE && (cd MU_BASECORE && git checkout ba9f76c16f0f170d233f25ffb52e6ab66d7873c2)
          git clone https://github.com/Microsoft/mu_plus.git Common/MU && (cd Common/MU && git checkout aea10a3baca8e48cfe76d869fa88460eadc5cfce)
          git clone https://github.com/Microsoft/mu_tiano_plus.git Common/TIANO && (cd Common/TIANO && git checkout 50e18df38333cc220f5b8d30cd9946a7bd384c30)
          git clone https://github.com/Microsoft/mu_oem_sample.git Common/MU_OEM_SAMPLE && (cd Common/MU_OEM_SAMPLE && git checkout 79efd1522566cca0169870addba3d57c3224694a)
          git clone https://github.com/Microsoft/mu_silicon_arm_tiano.git Silicon/ARM/TIANO && (cd Silicon/ARM/TIANO && git checkout bd7850321a762c1eb2f0a3b11bcac0265c863741)
          git clone https://github.com/microsoft/mu_feature_dfci.git Common/MU_DFCI && (cd Common/MU_DFCI && git checkout 9e06f210708c23257b3d57ff5ad02af02cdca1d5)
          git clone https://github.com/microsoft/mu_feature_debugger.git mu_feature_debugger && (cd mu_feature_debugger && git checkout cf5dadba437b32475eef22059496c051c1fe0386)
          cd MU_BASECORE && git submodule update --init --recursive
          cd ../Common/TIANO && git submodule update --init --recursive

      - name: Fix package paths
        run: python3 fix_paths.py

      - name: Install GNU Make
        run: |
          brew install make
          # Create 'make' symlink so stuart/build can find it
          ln -sf /opt/homebrew/opt/make/libexec/gnubin/gmake /opt/homebrew/opt/make/libexec/gnubin/make

      - name: Build macOS BaseTools
        run: |
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          cd MU_BASECORE/BaseTools/Source/C
          make 2>&1 || make 2>&1

      - name: Install Python deps
        run: pip3 install edk2-pytool-extensions edk2-pytool-library regex

      - name: Build UEFI Firmware
        run: |
          export PATH="$HOME/Library/Python/3.11/bin:/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          
          # Patch edk2toolext BEFORE stuart imports it (patch in site-packages)
          python3 -c "
          import edk2toolext, os
          f = os.path.join(edk2toolext.__path__[0], 'base_abstract_invocable.py')
          lines = open(f).readlines()
          new = []; skip = False
          for line in lines:
              if 'raise RuntimeError' in line:
                  skip = True
                  new.append('            pass  # bypassed\\n')
                  continue
              if skip:
                  if line.strip().endswith(')') or line.strip().endswith('\"))'):
                      skip = False
                  continue
              new.append(line)
          open(f, 'w').writelines(new)
          # Also patch TimeStamp
          misc = os.path.join(os.getcwd(), 'MU_BASECORE/BaseTools/Source/Python/Common/Misc.py')
          c = open(misc).read()
          c = c.replace('return os.stat(self.Path)[8]', 'return 0  #PATCHED')
          open(misc, 'w').write(c)
          print('PATCHED')
          "
          
          cd Platform/iPhone7Pkg
          stuart_build -c PlatformBuild.py TOOL_CHAIN_TAG=GCC5

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: uefi-iphone7
          path: |
            Build/*/DEBUG_GCC5/FV/*.fd
            Build/*/DEBUG_GCC5/FV/*.FV
