name: Build iPhone 7 UEFI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    env:
      GCC5_AARCH64_PREFIX: /usr/bin/aarch64-linux-gnu-
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu nasm
          pip3 install --upgrade pip
          pip3 install -r pip-requirements.txt

      - name: Remove NASM NuGet dep
        run: rm -f MU_BASECORE/BaseTools/Bin/nasm_ext_dep.yaml

      - name: Setup Conf
        run: |
          cd MU_BASECORE
          make -C BaseTools -j$(nproc)
          cd ..
          source MU_BASECORE/BaseTools/edksetup.sh

      - name: Build
        run: |
          source MU_BASECORE/BaseTools/edksetup.sh
          build -p Platform/iPhone7Pkg/iPhone7.dsc -b DEBUG -t GCC5 -a AARCH64
          
      - uses: actions/upload-artifact@v4
        with:
          name: iPhone7-UEFI
          path: Build/iPhone7-AARCH64/DEBUG_GCC5/FV/
