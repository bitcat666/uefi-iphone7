name: Build UEFI Firmware
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with: {submodules: recursive}
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: |
          brew install make llvm
          sudo ln -sf /opt/homebrew/opt/make/libexec/gnubin/gmake /usr/local/bin/make
      - run: |
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          cd MU_BASECORE/BaseTools/Source/C && make -j4
      - run: python3 fix_paths.py
      - run: pip3 install edk2-pytool-extensions edk2-pytool-library regex
      - run: |
          chmod +x scripts/*
          export PATH="$GITHUB_WORKSPACE/scripts:$GITHUB_WORKSPACE/MU_BASECORE/BaseTools/BinWrappers/PosixLike:$GITHUB_WORKSPACE/MU_BASECORE/BaseTools/Source/C/bin:$HOME/Library/Python/3.11/bin:/opt/homebrew/opt/make/libexec/gnubin:/opt/homebrew/opt/llvm/bin:/usr/local/bin:$PATH"
          export WORKSPACE="$GITHUB_WORKSPACE"
          export EDK_TOOLS_PATH="$GITHUB_WORKSPACE/MU_BASECORE/BaseTools"
          export PYTHONPATH="$GITHUB_WORKSPACE/MU_BASECORE/BaseTools/Source/Python"
          cd "$WORKSPACE"
          mkdir -p Conf
          cp MU_BASECORE/BaseTools/Conf/tools_def.template Conf/tools_def.txt
          cp MU_BASECORE/BaseTools/Conf/build_rule.template Conf/build_rule.txt
          printf "ACTIVE_PLATFORM=Platform/iPhone7Pkg/iPhone7.dsc\nTARGET=DEBUG\nTARGET_ARCH=AARCH64\nTOOL_CHAIN_TAG=GCC5\nBUILD_RULE_CONF=Conf/build_rule.txt\nTOOL_CHAIN_CONF=Conf/tools_def.txt\n" > Conf/target.txt
          printf '\x2A_GCC5_\x2A_\x2A_FAMILY               = GCC\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_CC_PATH           = gcc\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_SLINK_PATH        = gcc-ar\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_DLINK_PATH        = gcc\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_ASM_PATH          = gcc\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_PP_PATH           = gcc\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_ASLCC_PATH        = gcc\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_ASLPP_PATH        = gcc\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_VFRPP_PATH        = gcc\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_CC_FLAGS          = -target aarch64-unknown-none -march=armv8-a -mgeneral-regs-only -fno-stack-protector -funsigned-char -ffreestanding -fshort-wchar -Wall -O2 -include AutoGen.h\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_DLINK_FLAGS       = -target aarch64-unknown-none -nostdlib -Wl,--gc-sections -Wl,-z,common-page-size=0x20\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_ASM_FLAGS         = -target aarch64-unknown-none -march=armv8-a -c -x assembler -imacros AutoGen.h\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_ASLCC_FLAGS       = -target aarch64-unknown-none -march=armv8-a -c\n' >> Conf/tools_def.txt
          printf '\x2A_GCC5_AARCH64_SLINK_FLAGS       = \n' >> Conf/tools_def.txt
          # Build directly with EDK2 build.py
          python3 MU_BASECORE/BaseTools/Source/Python/build/build.py \
            -p Platform/iPhone7Pkg/iPhone7.dsc \
            -b DEBUG -t GCC5 -a AARCH64 \
            -n 4 \
            -D SHIP_MODE=FALSE
      - uses: actions/upload-artifact@v4
        with: {name: uefi-iphone7, path: Build/**/FV/*.fd}
