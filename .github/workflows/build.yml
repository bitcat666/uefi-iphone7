name: Build UEFI Firmware
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install GNU Make
        run: |
          brew install make
          sudo ln -sf /opt/homebrew/opt/make/libexec/gnubin/gmake /usr/local/bin/make
      - name: Build macOS BaseTools
        run: |
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          cd MU_BASECORE/BaseTools/Source/C
          make -j4
      - name: Fix package paths
        run: python3 fix_paths.py
      - name: Install Python deps
        run: pip3 install edk2-pytool-extensions edk2-pytool-library regex
      - name: Setup + Build
        run: |
          WS=$(pwd)
          chmod +x scripts/gcc-ar scripts/gcc-nm scripts/gcc-ranlib
          export PATH="$WS/scripts:$WS/MU_BASECORE/BaseTools/BinWrappers/PosixLike:$WS/MU_BASECORE/BaseTools/Source/C/bin:$HOME/Library/Python/3.11/bin:/opt/homebrew/opt/make/libexec/gnubin:/usr/local/bin:$PATH"
          # Create Conf with GCC5 for AARCH64 cross-compile
          mkdir -p Conf
          cp MU_BASECORE/BaseTools/Conf/tools_def.template Conf/tools_def.txt
          printf '*_GCC5_*_*_FAMILY               = GCC\n' >> Conf/tools_def.txt
          printf '*_GCC5_AARCH64_CC_PATH          = cc\n' >> Conf/tools_def.txt
          printf '*_GCC5_AARCH64_SLINK_PATH       = gcc-ar\n' >> Conf/tools_def.txt
          printf '*_GCC5_AARCH64_DLINK_PATH       = cc\n' >> Conf/tools_def.txt
          printf '*_GCC5_AARCH64_ASM_PATH         = cc\n' >> Conf/tools_def.txt
          printf '*_GCC5_AARCH64_PP_PATH          = cc\n' >> Conf/tools_def.txt
          printf '*_GCC5_AARCH64_ASLCC_PATH       = cc\n' >> Conf/tools_def.txt
          printf '*_GCC5_AARCH64_CC_FLAGS         = -target aarch64-unknown-none -march=armv8-a -mgeneral-regs-only -fno-stack-protector -funsigned-char -ffreestanding -fshort-wchar -Wall -O2\n' >> Conf/tools_def.txt
          printf '*_GCC5_AARCH64_DLINK_FLAGS      = -target aarch64-unknown-none -nostdlib -Wl,--gc-sections -Wl,-z,common-page-size=0x20\n' >> Conf/tools_def.txt
          printf '*_GCC5_AARCH64_SLINK_FLAGS      = crs\n' >> Conf/tools_def.txt
          printf '*_GCC5_AARCH64_ASM_FLAGS        = -target aarch64-unknown-none -march=armv8-a -c -x assembler-with-cpp\n' >> Conf/tools_def.txt
          printf '*_GCC5_AARCH64_ASLCC_FLAGS      = -target aarch64-unknown-none -march=armv8-a\n' >> Conf/tools_def.txt
          printf "ACTIVE_PLATFORM       = Platform/iPhone7Pkg/iPhone7.dsc\n" > Conf/target.txt
          printf "TARGET                = DEBUG\n" >> Conf/target.txt
          printf "TARGET_ARCH           = AARCH64\n" >> Conf/target.txt
          printf "TOOL_CHAIN_TAG        = GCC5\n" >> Conf/target.txt
          cd Platform/iPhone7Pkg
          stuart_setup -c PlatformBuild.py || true
          stuart_update -c PlatformBuild.py || true
          stuart_build -c PlatformBuild.py TOOL_CHAIN_TAG=GCC5
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: uefi-iphone7
          path: Build/**/FV/*.fd
