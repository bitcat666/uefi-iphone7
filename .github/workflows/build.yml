name: Build iPhone 7 UEFI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: |
          sudo -S -p '' apt-get update -qq
          sudo -S -p '' apt-get install -y -qq gcc-aarch64-linux-gnu nasm
          pip3 install --upgrade pip
          pip3 install -r pip-requirements.txt

      - name: Bypass NASM dep
        run: |
          # Create dummy NASM extdep to use system nasm
          mkdir -p $(pwd)/MU_BASECORE/BaseTools/Bin/nasm_extdep/nasm-1
          ln -sf $(which nasm) $(pwd)/MU_BASECORE/BaseTools/Bin/nasm_extdep/nasm-1/nasm
          # Also set PATH
          echo "$(pwd)/MU_BASECORE/BaseTools/Bin/nasm_extdep/nasm-1" >> $GITHUB_PATH

      - name: Update Dependencies
        run: |
          export GCC5_AARCH64_PREFIX=aarch64-linux-gnu-
          stuart_update -c Platform/iPhone7Pkg/PlatformBuild.py TOOL_CHAIN_TAG=GCC5

      - name: Build UEFI
        run: |
          export GCC5_AARCH64_PREFIX=aarch64-linux-gnu-
          stuart_build -c Platform/iPhone7Pkg/PlatformBuild.py TOOL_CHAIN_TAG=GCC5 TARGET=DEBUG
          
      - uses: actions/upload-artifact@v4
        with:
          name: iPhone7-UEFI
          path: Build/iPhone7-AARCH64/DEBUG_GCC5/FV/
