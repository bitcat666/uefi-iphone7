name: Build UEFI Firmware
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with: {submodules: recursive}
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: |
          brew install make llvm
          sudo ln -sf /opt/homebrew/opt/make/libexec/gnubin/gmake /usr/local/bin/make
      - run: |
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"
          cd MU_BASECORE/BaseTools/Source/C && make -j4
      - run: python3 fix_paths.py
      - run: pip3 install edk2-pytool-extensions edk2-pytool-library regex
      - run: |
          chmod +x scripts/*
          export PATH="$GITHUB_WORKSPACE/scripts:$GITHUB_WORKSPACE/MU_BASECORE/BaseTools/BinWrappers/PosixLike:$GITHUB_WORKSPACE/MU_BASECORE/BaseTools/Source/C/bin:$HOME/Library/Python/3.11/bin:/opt/homebrew/opt/make/libexec/gnubin:/opt/homebrew/opt/llvm/bin:/usr/local/bin:$PATH"
          export WORKSPACE="$GITHUB_WORKSPACE"
          cd Platform/iPhone7Pkg
          stuart_setup -c PlatformBuild.py || true
          stuart_update -c PlatformBuild.py || true
          # Ensure Conf exists (stuart may not create it on unsupported host)
          mkdir -p "$WORKSPACE/Conf"
          cp "$WORKSPACE/MU_BASECORE/BaseTools/Conf/tools_def.template" "$WORKSPACE/Conf/tools_def.txt"
          cp "$WORKSPACE/MU_BASECORE/BaseTools/Conf/build_rule.template" "$WORKSPACE/Conf/build_rule.txt"
          printf '\x2A_GCC5_\x2A_\x2A_FAMILY               = GCC\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_CC_PATH           = gcc\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_SLINK_PATH        = gcc-ar\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_DLINK_PATH        = gcc\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_ASM_PATH          = gcc\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_PP_PATH           = gcc\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_ASLCC_PATH        = gcc\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_ASLPP_PATH        = gcc\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_VFRPP_PATH        = gcc\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_CC_FLAGS          = -target aarch64-unknown-none -march=armv8-a -mgeneral-regs-only -fno-stack-protector -funsigned-char -ffreestanding -fshort-wchar -Wall -O2 -include AutoGen.h\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_DLINK_FLAGS       = -target aarch64-unknown-none -nostdlib -Wl,--gc-sections -Wl,-z,common-page-size=0x20\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_ASM_FLAGS         = -target aarch64-unknown-none -march=armv8-a -c -x assembler -imacros AutoGen.h\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_ASLCC_FLAGS       = -target aarch64-unknown-none -march=armv8-a -c -x assembler-with-cpp\n' >> "$WORKSPACE/Conf/tools_def.txt"
          printf '\x2A_GCC5_AARCH64_SLINK_FLAGS       = crs\n' >> "$WORKSPACE/Conf/tools_def.txt"
          # Override target.txt for GCC5+AARCH64
          printf "ACTIVE_PLATFORM=Platform/iPhone7Pkg/iPhone7.dsc\nTARGET=DEBUG\nTARGET_ARCH=AARCH64\nTOOL_CHAIN_TAG=GCC5\n" > "$WORKSPACE/Conf/target.txt"
          cd "$WORKSPACE/Platform/iPhone7Pkg"
          stuart_build -c PlatformBuild.py TOOL_CHAIN_TAG=GCC5
      - uses: actions/upload-artifact@v4
        with: {name: uefi-iphone7, path: Build/**/FV/*.fd}
