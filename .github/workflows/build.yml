name: Build iPhone 7 UEFI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nasm clang lld llvm iasl
          pip3 install --upgrade pip
          pip3 install -r pip-requirements.txt

      - name: Remove NASM NuGet dep
        run: rm -f MU_BASECORE/BaseTools/Bin/nasm_ext_dep.yaml

      - name: Generate Conf files
        run: |
          mkdir -p Conf
          cp MU_BASECORE/BaseTools/Conf/build_rule.template Conf/build_rule.txt
          cp MU_BASECORE/BaseTools/Conf/target.template Conf/target.txt
          cp MU_BASECORE/BaseTools/Conf/tools_def.template Conf/tools_def.txt
          sed -i 's/-Werror/-Wno-error/' Conf/tools_def.txt
          sed -i 's/^TARGET .*/TARGET = DEBUG/' Conf/target.txt
          sed -i 's/^TARGET_ARCH .*/TARGET_ARCH = AARCH64/' Conf/target.txt
          echo "ACTIVE_PLATFORM = Platform/iPhone7Pkg/iPhone7.dsc" >> Conf/target.txt
          echo "TOOL_CHAIN_TAG = CLANGPDB" >> Conf/target.txt

      - name: Update & Build
        run: |
          stuart_update -c Platform/iPhone7Pkg/PlatformBuild.py TOOL_CHAIN_TAG=CLANGPDB
          stuart_build -c Platform/iPhone7Pkg/PlatformBuild.py TOOL_CHAIN_TAG=CLANGPDB TARGET=DEBUG
          
      - uses: actions/upload-artifact@v4
        with:
          name: iPhone7-UEFI
          path: Build/iPhone7-AARCH64/DEBUG_CLANGPDB/FV/
