name: Build UEFI Firmware
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with: {submodules: recursive}
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gcc g++ make nasm uuid-dev
      - run: |
          make -C MU_BASECORE/BaseTools/Source/C -j$(nproc)
      - run: python3 fix_paths.py
      - run: pip3 install edk2-pytool-extensions edk2-pytool-library regex
      - run: |
          export WORKSPACE="$GITHUB_WORKSPACE"
          export EDK_TOOLS_PATH="$GITHUB_WORKSPACE/MU_BASECORE/BaseTools"
          export PYTHONPATH="$GITHUB_WORKSPACE/MU_BASECORE/BaseTools/Source/Python"
          export PATH="$GITHUB_WORKSPACE/MU_BASECORE/BaseTools/BinWrappers/PosixLike:$GITHUB_WORKSPACE/MU_BASECORE/BaseTools/Source/C/bin:$HOME/.local/bin:$PATH"
          cd "$WORKSPACE"
          # Let stuart_setup create Conf, then override target.txt
          mkdir -p Conf
          cp MU_BASECORE/BaseTools/Conf/tools_def.template Conf/tools_def.txt
          cp MU_BASECORE/BaseTools/Conf/build_rule.template Conf/build_rule.txt
          printf "ACTIVE_PLATFORM=Platform/iPhone7Pkg/iPhone7.dsc\nTARGET=DEBUG\nTARGET_ARCH=AARCH64\nTOOL_CHAIN_TAG=GCC5\nBUILD_RULE_CONF=Conf/build_rule.txt\nTOOL_CHAIN_CONF=Conf/tools_def.txt\n" > Conf/target.txt
          python3 MU_BASECORE/BaseTools/Source/Python/build/build.py \
            -p Platform/iPhone7Pkg/iPhone7.dsc \
            -b DEBUG -t GCC5 -a AARCH64 \
            -n $(nproc) \
            -D SHIP_MODE=FALSE
      - uses: actions/upload-artifact@v4
        with: {name: uefi-iphone7, path: Build/**/FV/*.fd}
